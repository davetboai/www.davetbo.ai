<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap');

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: white;
    position: relative;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #0a1628, #12203a, #0f172a);
  }

  .grid {
    position: absolute;
    inset: 0;
    opacity: 0.15;
    background-image:
      linear-gradient(rgba(255,255,255,1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px);
    background-size: 20px 20px;
  }

  .mesh {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 15% 35%, rgba(14,165,233,0.08), transparent),
      radial-gradient(ellipse 55% 40% at 85% 55%, rgba(99,102,241,0.07), transparent);
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 10px 40px;
  }

  .identity {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    margin-bottom: 0;
  }

  .name {
    font-family: 'Merriweather', serif;
    font-size: 88px;
    font-weight: 700;
    line-height: 0.9;
    text-align: right;
  }

  .photo {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.2);
    object-fit: cover;
    box-shadow: 0 16px 32px rgba(14,165,233,0.15);
  }

  .badges {
    display: flex;
    gap: 16px;
    margin: 50px 0 50px 0;
  }

  .badge {
    font-size: 22px;
    font-weight: 600;
    padding: 12px 28px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }

  .badge-gold { background: rgba(242, 169, 0, 0.9); }
  .badge-terra { background: rgba(218, 119, 86, 0.9); }

  .tagline {
    font-family: 'Merriweather', serif;
    font-size: 72px;
    font-weight: 700;
    line-height: 0.95;
    text-align: center;
  }

  .tagline .gradient {
    background: linear-gradient(135deg, #0ea5e9, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="mesh"></div>
  <div class="content">
    <div class="identity">
      <div class="name">Dave<br>Thibault</div>
      <img class="photo" src="file:///home/dave/workspace/www.davetbo.ai/frontend/public/profile.jpg" alt="">
    </div>
    <div class="badges">
      <span class="badge badge-gold">Sr. Applied AI Architect @ AWS</span>
      <span class="badge badge-terra">AWS's first official Anthropic Claude Champion since 2023</span>
    </div>
    <div class="tagline">Building anything<br><span class="gradient">we can envision.</span></div>
  </div>
</body>
</html>
